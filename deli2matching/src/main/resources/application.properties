spring.application.name=deli2matching
spring.config.import=optional:application-secret.properties

# 리버스 프록시(nginx) 뒤에서 X-Forwarded-Proto 헤더를 신뢰하여 https로 인식
server.forward-headers-strategy=framework

# jwt
jwt.secret-key=${jwt.secret-key}

# mysql
# 사용 할 JDBC 드라이버 설정 (MYSQL Connector/J)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 데이터베이스 연결 URL 설정 (로컬 MySQL 서버의 dev_db 데이터 베이스 사용, 타임존과 SSL 비활성화 포함) -
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/gachi_delivery?serverTimezone=Asia/Seoul&useSSL=false
# 데이터베이스 접속 사용자 이름
spring.datasource.username=${db-username}
# 데이터베이스 접속 비밀번호
spring.datasource.password=${db-password}

# MyBatis 설정
# mapper XML 파일 위치 지정
mybatis.mapper-locations=classpath:mapper/*.xml
# 엔티티 클래스 패키지 별칭 설정 (XML에서 짧은 클래스명 사용 가능)
mybatis.type-aliases-package=com.example.deli2matching/**
# snake_case DB 컬럼 -> camelCase 자바 필드 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# email settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth=true

# 구글
spring.security.oauth2.client.registration.google.client-id=${google.client-id}
spring.security.oauth2.client.registration.google.client-secret=${google.client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# 네이버
spring.security.oauth2.client.registration.naver.client-id=${naver.client-id}
spring.security.oauth2.client.registration.naver.client-secret=${naver.client-secret}
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/{action}/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# 카카오
spring.security.oauth2.client.registration.kakao.client-id=${kakao.client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${kakao.client-secret}
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# 깃허브
spring.security.oauth2.client.registration.github.client-id=${github.client-id}
spring.security.oauth2.client.registration.github.client-secret=${github.client-secret}
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/github
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.client-name=Github
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user

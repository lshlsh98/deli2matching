# 이 파일은 여러 개의 컨테이너를 한꺼번에 어떻게 켤지 알려주는 조립 설계도
# 우리는 상자가 두 개 필요해요.
#   1) backend  : 자바(스프링 부트) 서버 상자
#   2) frontend : 화면(React)을 보여주는 nginx 상자
# docker compose는 이 설계도를 보고 두 상자를 만들고, 서로 대화할 수 있게 연결해줘요.
#
# 참고: 데이터베이스(RDS)는 상자가 아님! AWS가 따로 관리해주는 진짜 DB 컴퓨터를
# 인터넷 너머에서 그냥 주소로 접속하는 거라서, 여기 설계도에는 등장하지 않음
# CloudFront도 마찬가지로 AWS가 따로 관리

# services: -> 이 아래에는 실행할 컨테이너 목록이 있음을 의미
services:
  # ===== 1) 백엔드(서버) 상자 =====
  # backend: -> 컨테이너의 이름(서비스 이름)을 지정
  # 여기서 중요한 것은 backend는 Docker Network 안에서 호스트 이름(hostname) 역할도 한다
  # Nginx에서 proxy_pass http://backend:8080; 라고 쓰면 backend가 바로 이 서비스를 의미
  backend:
    build:
      # ./deli2matching 폴더 안의 Dockerfile로 컨테이너를 만듦
      context: ./deli2matching
      dockerfile: Dockerfile
    # 컨테이너 이름을 사람이 보기 쉽게 지정 없으면 Docker가 이름을 자동으로 생성
    container_name: deli2matching-backend
    # 상자가 갑자기 꺼지면(예: 에러로 죽으면) 자동으로 다시 켜줌
    restart: unless-stopped
    # expose는 같은 동네(네트워크) 안에 있는 다른 상자한테만 8080번 문을 열어준다는 뜻
    # ports처럼 인터넷(바깥 세상)에는 직접 열어주지 않아요. 더 안전
    expose:
      - "8080"
    # environment는 서버 상자 안에 쪽지로 몰래 전달해주는 값들
    # 비밀번호나 열쇠(secret) 같은 건 코드에 직접 쓰지 않고 이렇게 밖에서 넣어줌
    environment:
      # DB(RDS) 접속 정보. ${RDS_HOST}처럼 생긴 건 .env 파일에서 값을 가져온다는 뜻
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:3306/gachi_delivery?serverTimezone=Asia/Seoul&useSSL=false
      db-username: ${DB_USERNAME}
      db-password: ${DB_PASSWORD}
      # 로그인할 때 신분증(토큰)을 만들고 확인하는 데 쓰는 비밀 열쇠
      jwt.secret-key: ${JWT_SECRET_KEY}
      # 이메일 인증 보낼 때 쓰는 구글 메일 계정 정보
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      # 구글/네이버/카카오/깃허브로 로그인할 때 필요한 각 서비스의 앱 열쇠들
      google.client-id: ${GOOGLE_CLIENT_ID}
      google.client-secret: ${GOOGLE_CLIENT_SECRET}
      naver.client-id: ${NAVER_CLIENT_ID}
      naver.client-secret: ${NAVER_CLIENT_SECRET}
      kakao.client-id: ${KAKAO_CLIENT_ID}
      kakao.client-secret: ${KAKAO_CLIENT_SECRET}
      github.client-id: ${GITHUB_CLIENT_ID}
      github.client-secret: ${GITHUB_CLIENT_SECRET}
    # healthcheck는 이 상자 아직 잘 살아있어? 를 docker가 스스로 자꾸 확인해보는 것
    # 8080번 문을 두드려보고(nc -z), 반응이 없으면 이 상자 아픈가봐 하고 표시
    # Netcat(nc) 이란 네트워크 연결을 테스트하는 아주 작은 프로그램이다
    healthcheck:
      # 8080 포트가 열려 있는지 확인
      # localhost는 내 PC가 아니라 컨테이너 자기 자신
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 30s # 30초마다 한 번씩 확인
      timeout: 5s # 5초 안에 대답 없으면 실패
      retries: 5 # 5번 연속 실패하면 진짜 아픔 판정
      start_period: 40s # 처음 켜질 땐 준비 시간이 필요하니까 40초는 봐줌
    # backend와 frontend가 서로 이야기할 수 있도록 같은 동네(네트워크)에 넣음
    # 컨테이너는 기본적으로 서로 모름
    networks:
      - app-network

  # ===== 2) 프론트엔드(화면) 상자 =====
  frontend:
    build:
      # ./deli2matching_front 폴더 안의 Dockerfile로 컨테이너를 만듦
      context: ./deli2matching_front
      dockerfile: Dockerfile
      # 화면을 만들 때(빌드할 때) 우리 서버 주소가 여기야! 라고 미리 알려주는 값이에요.
      # CloudFront 주소가 바뀌면 이 값도 바꾸고 다시 빌드

      # backend의 environment는 Spring Boot가 실행하면서 읽음
      # args는 React가 빌드하면서 읽음
      # React(Vite)는 브라우저에서 실행되는 정적 파일을 만드는 도구이다. 브라우저는 Docker의 환경 변수를 읽을 수 없으므로, 빌드할 때 필요한 값(API 주소 등)을 미리 JavaScript 파일에 포함해야 한다. 그래서 build.args를 사용해 VITE_API_BASE_URL을 전달하고, npm run build 과정에서 최종 JS 파일에 반영한다
      # args -> 이미지를 빌드하는 시점에서 사용
      # environment -> 컨테이너를 실행하는 시점에서 사용
      # React는 실행되는 프로그램이 없음 남는 것은 정적 파일뿐 -> 빌드할 때 API 주소를 JS 안에 넣어야 함
      # Spring Boot는 프로그램이 계속 살아 있음 DB 비밀번호는 실행 중에도 필요 -> environment를 사용
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: deli2matching-frontend
    restart: unless-stopped
    # 이 상자는 진짜 손님(인터넷)을 직접 맞이해야 하니까, EC2 컴퓨터의 80번 문을 이 상자의 80번 문과 연결
    ports:
      - "80:80"
    # backend가 건강해요(healthy)라고 확인될 때까지 기다렸다가 frontend를 킴 (서버가 준비도 안 됐는데 화면부터 열리면 손님이 에러를 볼 수도 있음)
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Nginx의 Health Check에서는 curl을 사용하는 경우가 더 많음
      # Nginx가 실행은 되었지만 설정 파일이 잘못되었다고 가정할 때 포트만 열려있어도 성공
      # curl을 사용해야 실제로 웹 서버가 정상적으로 동작하는지까지 확인할 수 있음
      test: ["CMD-SHELL", "curl -fs http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

# 두 상자가 서로를 이름(backend, frontend)만으로 찾아서 대화할 수 있게 해주는 우리끼리만 쓰는 작은 동네 통신망을 하나 만듦
networks:
  app-network:
    driver: bridge

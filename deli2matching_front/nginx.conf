# 이 파일은 nginx라는 안내 데스크 직원에게 주는 매뉴얼
# 손님(브라우저)이 우리 웹사이트에 오면, 이 직원이 요청 주소를 보고
# 이건 그림/화면이니까 내가 바로 보여줄게 또는 이건 서버(백엔드)한테 물어봐야 해 를 판단해서 알맞은 곳으로 안내

# 브라우저가 WebSocket 연결을 요청하면 Connection 헤더를 upgrade로 바꾸고, 그렇지 않으면 close로 설정
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
# map A B {...} -> A값을 보고 B값을 결정 (A -> 이미 존재하는 Nginx 변수, B -> 내가 새로 만드는 Nginx 변수)
# Nginx 변수는 앞에 $ 를 붙인다 
# map $http_upgrade $connection_upgrade 에서 브라우저가 Upgrade: websocket 을 보냈다면 $http_upgrade = websocket Upgrade 헤더가 없으면 $http_upgrade = 빈 문자열 
# default upgrade -> 헤더가 있으면 $connection_upgrade = upgrade
# .. upgrade      -> 헤더가 없으면 $connection_upgrade = close
# Nginx에는 규칙 HTTP 헤더를 $http_헤더이름 변수로 사용할 수 있다

server {
    # 80번 포트로 들어오는 요청을 받아라 (웹사이트 기본 문)
    listen 80;
    # 어떤 도메인으로 들어온 요청을 처리할지를 의미
    # 예를 들어 server_name example.com; 이면 https://example.com 으로 들어온 요청만 처리
    server_name _;
    # server_name _; -> 특정 도메인을 구분X

    # 우리 화면 파일들(html/css/js)이 들어있는 창고 위치
    root /usr/share/nginx/html;
    # 딱히 파일 이름을 안 적고 들어오면 index.html을 보여줌 (홈페이지 첫 화면)
    index index.html;

    # 한글이 깨지지 않도록 글자 규칙을 정함
    charset utf-8;
    # 파일을 올릴 때(업로드) 최대 20MB까지만 허용
    client_max_body_size 20M;

    # gzip은 파일을 작게 압축해서 보내는 기능
    # 압축해서 보내면 브라우저에 더 빨리 도착
    gzip on;
    # 브라우저마다 압축을 지원하는지 안 하는지가 다를 수 있음
    # gzip_vary on -> 압축 버전, 비압축 버전 을 캐시에서 구분하도록 헤더를 추가
    gzip_vary on;
    # 압축 강도
    gzip_comp_level 5;
    # 56바이트보다 작은 파일은 압축X
    gzip_min_length 256;
    # 어떤 파일을 압축할지 지정
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript image/svg+xml;

    # /healthz 라는 주소로 물어보면 그냥 ok라고 짧게 대답
    # 이건 나 아직 잘 살아있어 라고 알려주는 신호 (컴퓨터가 자동으로 확인할 때 사용)
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # js, css, 이미지 같은 파일들은 이름에 항상 랜덤한 표시(해시)가 붙어서 만들어짐
    # 그래서 파일 이름이 안 바뀌면 내용도 절대 안 바뀐다는 뜻
    # 그러니까 브라우저한테 이 파일은 1년 동안 다시 안 받아도 돼, 그냥 저장해둔 거 써 라고 알려줌
    # (마치 한번 외운 구구단은 다시 안 외워도 되는 것처럼요)
    
    # location ~* (~: 정규표현식으로 URL을 검사 / *: 대소문자를 구분X)
    # \. (.은 아무 문자 하나를 의미, 진짜 .을 나타내려면 \.로 작성)
    # ?:... -> 여러 개 중 하나 / | -> 또는(or)
    # woff2? -> 여기서 ? 는 앞 문자가 있어도 되고 없어도 된다 즉, woff도 되고, woff2도 된다
    # jpe?g -> jpeg도 되고 jpg도 된다
    # $ 는 문자열의 끝을 의미 -> main.js는 매칭되지만 main.js.bak은 매칭되지 않음
    # React에서 사용하는 JS, CSS, 이미지, 폰트 파일을 모두 처리한다는 뜻
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
        # 요청한 파일이 실제 존재하는지 확인하고 있으면 브라우저에 전달, 없으면 404 Not Found 반환
        try_files $uri =404;
        # 브라우저에게 이 파일은 1년 동안 다시 다운로드하지 않아도 됨을 전달
        expires 1y;
        # 브라우저에게 캐시 정책을 알려주는 HTTP 헤더 (public -> 누구나 캐시해도 됨 / immutable -> 이 파일은 바뀌지 않음)
        add_header Cache-Control "public, immutable";
        # 로그를 남기지 않음
        access_log off;
    }

    # 반대로 index.html은 새로운 배포가 있을 때마다 내용이 바뀔 수 있음 그래서 이건 절대 저장해두지 말고, 매번 새로 가져와 라고 알려줌
    location = /index.html {
        # no-cache: 캐시를 사용할 수는 있지만, 사용하기 전에 반드시 서버에게 최신인지 확인해라
        # no-store: 아예 저장하지 마라
        # must-revalidate: 캐시가 만료되면 반드시 서버에 다시 확인해야 한다
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    # 정적 파일 -> 바뀌면 파일명이 바뀌어서 오래 캐시해도 안전
    # index.html -> 바뀌어도 파일명이 안 바뀜 그래서 항상 최신 버전을 받아야함

    # ---- 여기부터는 백엔드(스프링 부트 서버)한테 넘겨줄 주소들 ----
    # 아래 네 곳은 패턴이 똑같아요:
    #   1) 이 주소로 온 요청은 안내데스크가 직접 처리하지 않고 backend:8080 이라는
    #      다른 방(컨테이너)으로 그대로 전달(proxy_pass)해요.
    #   2) 손님의 원래 정보(Host, 진짜 IP 주소 등)를 편지봉투에 적어서 같이 보내줘요.
    #      그래야 backend가 "아, 이 요청은 원래 이런 손님이 보낸 거구나" 하고 알 수 있어요.

    # 회원가입/로그인 관련 요청
    location /auth {
        # 이 요청을 backend라는 서버의 8080 포트로 전달
        # backend는 docker-compose에서 설정
        proxy_pass http://backend:8080/auth;
        # Spring Boot에게 원래 요청한 Host를 전달
        proxy_set_header Host $host;
        # $remote_addr 는 현재 접속한 클라이언트의 IP
        proxy_set_header X-Real-IP $remote_addr;
        # 사용자의 실제 IP를 전달하는 헤더 차이는 여러 프록시를 거쳐도 모든 IP를 기록한다는 것
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Spring Boot에게 원래 사용자는 HTTPS로 접속했다 라고 알려줌
        # AWS에서는 HTTPS를 로드밸런서가 처리하고 Nginx에는 HTTP로 전달할 수 있음, 그러면 Spring Boot는 http 라고 착각, 그래서 X-Forwarded-Proto: https를 전달해 실제 사용자는HTTPS로 접속했다고 알려줌
        proxy_set_header X-Forwarded-Proto https;
        # Spring Boot가 응답 헤더에 Location: http://... 를 넣어 보내면 Nginx가 자동으로 Location: https://... 로 바꿔줌
        proxy_redirect http:// https://;
    }

    # 배달 관련 요청
    location /delivery {
        proxy_pass http://backend:8080/delivery;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 채팅 목록/기록 관련 요청 (실시간 채팅 자체는 아래 /connect 에서 따로 처리)
    location /chat {
        proxy_pass http://backend:8080/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 마이페이지(내 정보) 관련 요청
    location /mypage {
        proxy_pass http://backend:8080/mypage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 구글/네이버/카카오/깃허브 로그인이 끝나고 돌아오는 콜백 주소
    location /oauth2 {
        proxy_pass http://backend:8080/oauth2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 소셜 로그인 시작 버튼을 눌렀을 때 가는 주소
    location /login {
        proxy_pass http://backend:8080/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 실시간 채팅(웹소켓/STOMP)은 연결을 계속 유지해야 함
    # 그래서 보통 요청과 다르게 Upgrade/Connection 같은 특별한 편지봉투 표시가 더 필요
    # 연결이 오래 걸려도(proxy_read_timeout 3600s = 1시간) 안 끊기게 넉넉히 기다림
    location /connect {
        proxy_pass http://backend:8080/connect;
        # HTTP/1.1의 Upgrade 기능 사용 (HTTP/1.0 에서는 Upgrade 기능이 없음)
        proxy_http_version 1.1;
        # Upgrade와 Connection 이 두 헤더가 없으면 Spring Boot는 WebSocket 요청인지 모른다
        # 브라우저가 보낸 Upgrade: websocket 헤더를 Spring Boot에도 그대로 전달
        proxy_set_header Upgrade $http_upgrade;
        # 위에서 생성한 $http_upgrade를 헤더에 담아서 전달
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
        # WebSocket은 오랫동안 아무 메시지가 없을 수도 있음
        proxy_read_timeout 3600s;
    }

    # 위의 어떤 주소에도 안 걸리는 나머지 모든 요청은 전부 우리 React 화면이 처리
    # (예: /login-page, /mypage/edit 같은 화면 이동은 React Router가 알아서 처리하니까
    #  일단 index.html을 보여주면, 그 안에서 React가 알맞은 화면을 그려줘요)
    # 이 규칙은 반드시 제일 마지막에 있어야 해요. (다른 규칙들이 먼저 확인되게 하려고요)
    location / {
        # 요청한 파일이 실제 있으면 그 파일을 보여주고, 없으면 무조건 index.html을 보여줘 라는 뜻
        try_files $uri $uri/ /index.html;
        # 순서대로 시도하라는 것
        # 1번 $uri 는 현재 요청한 URL 예를 들어 GET /logo.pngNginx는 /usr/share/nginx/html/logo.png 파일이 있는지 확인 있으면 그 파일을 보냄
        # 2번 $uri/는 디렉터리인지 확인 예를 들어 GET /docs 라면 /docs/ 폴더가 있는지 확인 있으면 그 안의 index.html 등을 찾아서 보여줌
        # /index.html 은 앞의 두 개가 모두 실패하면 index.html을 반환
        # React Router가 URL(/login, /mypage, /chat/15 등)을 직접 처리할 수 있게 되며, 사용자가 URL을 직접 입력하거나 새로고침해도 404 오류 없이 정상적으로 화면이 표시됨 
        # React, Vue, Angular 같은 SPA에서 try_files $uri $uri/ /index.html; 설정이 거의 필수인 이유
    } 
    
}

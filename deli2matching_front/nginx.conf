# 이 파일은 nginx라는 안내 데스크 직원에게 주는 매뉴얼
# 손님(브라우저)이 우리 웹사이트에 오면, 이 직원이 요청 주소를 보고
# 이건 그림/화면이니까 내가 바로 보여줄게 또는 이건 서버(백엔드)한테 물어봐야 해 를 판단해서 알맞은 곳으로 안내

# 브라우저가 WebSocket 연결을 요청하면 Connection 헤더를 upgrade로 바꾸고, 그렇지 않으면 close로 설정
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
# map A B {...} -> A값을 보고 B값을 결정 (A -> 이미 존재하는 Nginx 변수, B -> 내가 새로 만드는 Nginx 변수)
# Nginx 변수는 앞에 $ 를 붙인다 
# map $http_upgrade $connection_upgrade 에서 브라우저가 Upgrade: websocket 을 보냈다면 $http_upgrade = websocket Upgrade 헤더가 없으면 $http_upgrade = 빈 문자열 
# default upgrade -> 헤더가 있으면 $connection_upgrade = upgrade
# .. upgrade      -> 헤더가 없으면 $connection_upgrade = close
# Nginx에는 규칙 HTTP 헤더를 $http_헤더이름 변수로 사용할 수 있다

server {
    # 80번 문(포트)으로 들어오는 손님을 받을게요. (웹사이트 기본 문)
    listen 80;
    server_name _;

    # 우리 화면 파일들(html/css/js)이 들어있는 창고 위치예요.
    root /usr/share/nginx/html;
    # 딱히 파일 이름을 안 적고 들어오면 index.html을 보여줘요. (홈페이지 첫 화면)
    index index.html;

    # 한글이 깨지지 않도록 글자 규칙을 정해줘요.
    charset utf-8;
    # 손님이 파일을 올릴 때(업로드) 최대 20MB까지만 허용해요. (너무 큰 파일은 거절!)
    client_max_body_size 20M;

    # gzip은 "파일을 작게 압축해서 보내는" 기능이에요. 우체국에서 택배를 작게 포장하는 것과 비슷해요.
    # 압축해서 보내면 손님(브라우저)한테 더 빨리 도착해요.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml text/javascript image/svg+xml;

    # "/healthz" 라는 주소로 물어보면 그냥 "ok"라고 짧게 대답해요.
    # 이건 "나 아직 잘 살아있어!" 라고 알려주는 신호예요. (컴퓨터가 자동으로 확인할 때 사용)
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # js, css, 이미지 같은 파일들은 이름에 항상 랜덤한 표시(해시)가 붙어서 만들어져요.
    # 그래서 파일 이름이 안 바뀌면 내용도 절대 안 바뀐다는 뜻이에요.
    # 그러니까 브라우저한테 "이 파일은 1년 동안 다시 안 받아도 돼, 그냥 저장해둔 거 써!" 라고 알려줘요.
    # (마치 한번 외운 구구단은 다시 안 외워도 되는 것처럼요)
    location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 반대로 index.html은 새로운 배포가 있을 때마다 내용이 바뀔 수 있어요.
    # 그래서 "이건 절대 저장해두지 말고, 매번 새로 가져와!" 라고 알려줘요.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- 여기부터는 백엔드(스프링 부트 서버)한테 넘겨줄 주소들이에요 ----
    # 아래 네 곳은 패턴이 똑같아요:
    #   1) 이 주소로 온 요청은 안내데스크가 직접 처리하지 않고 backend:8080 이라는
    #      다른 방(컨테이너)으로 그대로 전달(proxy_pass)해요.
    #   2) 손님의 원래 정보(Host, 진짜 IP 주소 등)를 편지봉투에 적어서 같이 보내줘요.
    #      그래야 backend가 "아, 이 요청은 원래 이런 손님이 보낸 거구나" 하고 알 수 있어요.

    # 회원가입/로그인 관련 요청
    location /auth {
        proxy_pass http://backend:8080/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 배달 관련 요청
    location /delivery {
        proxy_pass http://backend:8080/delivery;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 채팅 목록/기록 관련 요청 (실시간 채팅 자체는 아래 /connect 에서 따로 처리해요)
    location /chat {
        proxy_pass http://backend:8080/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 마이페이지(내 정보) 관련 요청
    location /mypage {
        proxy_pass http://backend:8080/mypage;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 구글/네이버/카카오/깃허브 로그인이 끝나고 돌아오는 콜백 주소예요.
    location /oauth2 {
        proxy_pass http://backend:8080/oauth2;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 소셜 로그인 시작 버튼을 눌렀을 때 가는 주소예요.
    location /login {
        proxy_pass http://backend:8080/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
    }

    # 실시간 채팅(웹소켓/STOMP)은 전화 통화처럼 "연결을 계속 유지"해야 해요.
    # 그래서 보통 요청과 다르게 Upgrade/Connection 같은 특별한 편지봉투 표시가 더 필요하고,
    # 연결이 오래 걸려도(proxy_read_timeout 3600s = 1시간) 안 끊기게 넉넉히 기다려줘요.
    location /connect {
        proxy_pass http://backend:8080/connect;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect http:// https://;
        proxy_read_timeout 3600s;
    }

    # 위의 어떤 주소에도 안 걸리는 나머지 모든 요청은 전부 우리 React 화면이 처리해요.
    # (예: /login-page, /mypage/edit 같은 화면 이동은 React Router가 알아서 처리하니까
    #  일단 index.html을 보여주면, 그 안에서 React가 알맞은 화면을 그려줘요)
    # 이 규칙은 반드시 제일 마지막에 있어야 해요. (다른 규칙들이 먼저 확인되게 하려고요)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
